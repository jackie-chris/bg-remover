<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片背景移除工具 - BG Remover</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .upload-area {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px dashed #ddd;
            margin-bottom: 30px;
        }

        .upload-area:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .upload-area.dragover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .upload-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .upload-text {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #888;
            font-size: 0.9rem;
        }

        #fileInput {
            display: none;
        }

        .result-area {
            display: none;
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .result-area.show {
            display: block;
        }

        .comparison {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .image-box {
            flex: 1;
            text-align: center;
        }

        .image-box h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .image-container {
            background: repeating-conic-gradient(#f0f0f0 0% 25%, white 0% 50%) 50% / 20px 20px;
            border-radius: 10px;
            padding: 10px;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-container img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 5px;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .download-btn:hover {
            transform: scale(1.05);
        }

        .download-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-area {
            display: none;
            background: #fff;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            color: #e74c3c;
        }

        .error-area.show {
            display: block;
        }

        .error-area button {
            margin-top: 20px;
            padding: 10px 30px;
            border: none;
            background: #e74c3c;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
        }

        footer {
            text-align: center;
            color: white;
            opacity: 0.8;
            margin-top: 30px;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .comparison {
                flex-direction: column;
            }
            
            header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎨 图片背景移除</h1>
            <p>一键去除图片背景，支持 JPG、PNG、WebP 格式</p>
        </header>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">拖拽图片到此处，或点击选择文件</div>
            <div class="upload-hint">支持 JPG、PNG、WebP，最大 10MB</div>
            <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp">
        </div>

        <div class="loading" id="loadingArea">
            <div class="spinner"></div>
            <p>正在处理中，请稍候...</p>
        </div>

        <div class="error-area" id="errorArea">
            <p id="errorMessage">处理失败，请重试</p>
            <button onclick="resetPage()">重新上传</button>
        </div>

        <div class="result-area" id="resultArea">
            <div class="comparison">
                <div class="image-box">
                    <h3>📷 原图</h3>
                    <div class="image-container">
                        <img id="originalImage" src="" alt="原图">
                    </div>
                </div>
                <div class="image-box">
                    <h3>✨ 去背景后</h3>
                    <div class="image-container">
                        <img id="resultImage" src="" alt="结果">
                    </div>
                </div>
            </div>
            <div style="text-align: center;">
                <button class="download-btn" id="downloadBtn">
                    <span>⬇️</span>
                    <span>下载 PNG</span>
                </button>
            </div>
        </div>

        <footer>
            <p>Powered by Cloudflare Workers + Remove.bg API</p>
        </footer>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const loadingArea = document.getElementById('loadingArea');
        const errorArea = document.getElementById('errorArea');
        const errorMessage = document.getElementById('errorMessage');
        const resultArea = document.getElementById('resultArea');
        const originalImage = document.getElementById('originalImage');
        const resultImage = document.getElementById('resultImage');
        const downloadBtn = document.getElementById('downloadBtn');

        let resultBlob = null;

        // 点击上传
        uploadArea.addEventListener('click', () => fileInput.click());

        // 文件选择
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        // 拖拽上传
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        async function handleFile(file) {
            // 验证文件类型
            const validTypes = ['image/jpeg', 'image/png', 'image/webp'];
            if (!validTypes.includes(file.type)) {
                showError('仅支持 JPG、PNG、WebP 格式');
                return;
            }

            // 验证文件大小 (10MB)
            if (file.size > 10 * 1024 * 1024) {
                showError('文件大小不能超过 10MB');
                return;
            }

            // 显示原图
            const reader = new FileReader();
            reader.onload = (e) => {
                originalImage.src = e.target.result;
            };
            reader.readAsDataURL(file);

            // 显示加载状态
            uploadArea.style.display = 'none';
            loadingArea.classList.add('show');

            try {
                // 转换为 Base64
                const base64 = await fileToBase64(file);
                
                // 调用 API
                const response = await fetch('https://bg-remover.workers.dev/api/remove-bg', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        image: base64.split(',')[1] // 移除 data:image/xxx;base64, 前缀
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || '处理失败');
                }

                // 获取结果图片
                resultBlob = await response.blob();
                resultImage.src = URL.createObjectURL(resultBlob);

                // 显示结果
                loadingArea.classList.remove('show');
                resultArea.classList.add('show');

            } catch (error) {
                showError(error.message);
            }
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function showError(message) {
            loadingArea.classList.remove('show');
            errorMessage.textContent = message;
            errorArea.classList.add('show');
        }

        function resetPage() {
            uploadArea.style.display = 'block';
            errorArea.classList.remove('show');
            resultArea.classList.remove('show');
            fileInput.value = '';
            resultBlob = null;
        }

        // 下载按钮
        downloadBtn.addEventListener('click', () => {
            if (resultBlob) {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(resultBlob);
                link.download = 'bg-removed.png';
                link.click();
            }
        });
    </script>
</body>
</html>
