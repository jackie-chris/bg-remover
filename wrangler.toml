name = "bg-remover"
main = "worker/index.js"
compatibility_date = "2024-01-01"

# 静态资源托管
[site]
bucket = "./public"

# 环境变量（敏感信息通过 wrangler secret 设置）
# wrangler secret put REMOVEBG_API_KEY

# 开发环境配置
[dev]
port = 8787
local_protocol = "http"

# 生产环境路由
# routes = [
#   { pattern = "bg-remover.yourdomain.com/*", zone_name = "yourdomain.com" }
# ]
